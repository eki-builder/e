<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reset password — Eki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/alert.css">
</head>
<body>

<div class="page">
  <div class="auth-card">
    <a href="index.html" class="auth-brand"><span class="auth-brand-mark"></span>Eki</a>
    <h2>Set a new password</h2>
    <p class="auth-sub">Choose something you haven't used before</p>

    <div class="field">
      <label for="newPassword">New password</label>
      <input type="password" id="newPassword" autocomplete="new-password">
    </div>

    <div class="field">
      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" autocomplete="new-password">
    </div>

    <button class="primary-btn" onclick="resetPassword()">Reset password</button>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/alert.js"></script>
</body>
</html>
