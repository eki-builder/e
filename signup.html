<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Create your account — Eki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/alert.css">
</head>
<body>

<div class="page">
  <div class="auth-card">
    <a href="index.html" class="auth-brand"><span class="auth-brand-mark"></span>Eki</a>
    <h2>Start your free trial</h2>
    <p class="auth-sub">7 days free. No card needed.</p>

    <div class="field">
      <label for="signupName">Your name or business name</label>
      <input type="text" id="signupName" autocomplete="name">
    </div>

    <div class="field">
      <label for="signupEmail">Email</label>
      <input type="email" id="signupEmail" autocomplete="email">
    </div>

    <div class="field">
      <label for="signupPassword">Password</label>
      <div class="input-wrapper">
        <input type="password" id="signupPassword" autocomplete="new-password">
        <div class="toggle-password" onclick="togglePassword('signupPassword', this)">
          <img src="assets/eye.svg" alt="">
        </div>
      </div>
    </div>

    <button class="primary-btn" id="signupBtn" onclick="signup()">Create account</button>

    <div class="divider">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/alert.js"></script>
</body>
</html>
